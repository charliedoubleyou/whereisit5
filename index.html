            { name: "Eucla", timezone: "Australia/Eucla", lat: -31.6778, lng: 128.8889 }, // UTC+8:45
            { name: "Nepal", timezone: "Asia/Kathmandu", lat: 28.2096, lng: 83.9856 }, // UTC+5:45
            { name: "Chatham Islands", timezone: "Pacific/Chatham", lat: -43.9500, lng: -176.5500 }, // UTC+12:45

            // 🌍 Africa niche
            { name: "Stone Town", timezone: "Africa/Dar_es_Salaam", lat: -6.1659, lng: 39.2026 },
            { name: "Swakopmund", timezone: "Africa/Windhoek", lat: -22.6784, lng: 14.5266 },
            { name: "Lalibela", timezone: "Africa/Addis_Ababa", lat: 12.0317, lng: 39.0473 },

            // 🧭 Random but awesome additions
            { name: "Eureka", timezone: "America/Los_Angeles", lat: 40.8021, lng: -124.1637 },
            { name: "June Lake", timezone: "America/Los_Angeles", lat: 37.7791, lng: -119.0771 },
            { name: "Queenstown", timezone: "Pacific/Auckland", lat: -45.0312, lng: 168.6626 }
        ];

        function getLocalHour(timezone) {
            return parseInt(
                new Date().toLocaleString("en-US", {
                    timeZone: timezone,
                    hour: "2-digit",
                    hour12: false
                }),
                10
            );
        }

        function getLocalTimeString(timezone) {
            return new Date().toLocaleTimeString("en-US", {
                timeZone: timezone,
                hour: "numeric",
                minute: "2-digit",
                hour12: true
            });
        }

        function getFivePMPlaces() {
            return places.filter(place => getLocalHour(place.timezone) === 17);
        }

        function getRandomPlace(placeList) {
            const index = Math.floor(Math.random() * placeList.length);
            return placeList[index];
        }

        function checkFive() {
            const list = document.getElementById("cityList");
            list.innerHTML = "";

            const matchingPlaces = getFivePMPlaces();
            
            clearMarkers();

            if (matchingPlaces.length === 0) {
                const div = document.createElement("div");
                div.textContent = "no places in your dataset are at 5 PM right now.";
                list.appendChild(div);
                return;
            }

            const featuredPlace = getRandomPlace(matchingPlaces);

            const marker = L.marker([featuredPlace.lat, featuredPlace.lng])
                .addTo(map)
                .bindPopup(`${featuredPlace.name} — ${getLocalTimeString(featuredPlace.timezone)}`);
            markers.push(marker);
            
            map.flyTo(
                [featuredPlace.lat, featuredPlace.lng],
                6,
                { duration: 1 }
            );

            const featuredDiv = document.createElement("div");
            featuredDiv.textContent = `featured 5 o'clock spot: ${featuredPlace.name} — ${getLocalTimeString(featuredPlace.timezone)}`;
            featuredDiv.style.fontWeight = "bold";
            featuredDiv.style.marginBottom = "12px";
            list.appendChild(featuredDiv);

        }
    </script>
</body>
</html>
